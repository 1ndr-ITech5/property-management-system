<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gold Gradient -->
    <linearGradient id="goldGradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A" /> <!-- Light Gold -->
      <stop offset="50%" stop-color="#F59E0B" /> <!-- Amber Gold -->
      <stop offset="100%" stop-color="#D97706" /> <!-- Deep Gold -->
    </linearGradient>
    
    <!-- Suburban Glow for Visibility -->
    <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- High-Contrast White Path with Gold Accent -->
  <path d="M50 15L15 45V85H35V60H65V85H85V45L50 15Z" fill="white" filter="url(#whiteGlow)" />
  
  <!-- "LE" Initial in Gold -->
  <path d="M42 45H52V48H45V53H51V56H45V61H52V64H42V45Z" fill="url(#goldGradient)" /> <!-- E-like shape -->
  <path d="M30 45H33V61H40V64H30V45Z" fill="url(#goldGradient)" /> <!-- L-like shape -->
  
  <!-- Elegant Keyhole detail in Gold -->
  <circle cx="50" cy="32" r="4" fill="url(#goldGradient)" />
  <rect x="48" y="34" width="4" height="6" rx="1.5" fill="url(#goldGradient)" />
</svg>
